name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo package --manifest-path crates/mcd-core/Cargo.toml
      # The remaining crates depend on mcd-core from crates.io during package
      # preparation, so package them after publishing mcd-core for the first
      # release, then keep checking them in the release workflow.

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json
      - run: rustup target add wasm32-unknown-unknown
      - run: npm ci
        working-directory: bindings/typescript
      - run: npm test
        working-directory: bindings/typescript
      - run: npm pack --dry-run
        working-directory: bindings/typescript

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip maturin pytest pandas
      - run: python -m pytest
        working-directory: bindings/python
      - run: maturin build --sdist --out dist
        working-directory: bindings/python

  php:
    name: PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - run: cargo install --path crates/mcd-cli
      - run: composer validate --strict
        working-directory: bindings/php
      - run: composer test
        working-directory: bindings/php
