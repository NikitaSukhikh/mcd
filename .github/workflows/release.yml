name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-rust:
    name: Publish Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path crates/mcd-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: sleep 60
      - run: cargo publish --manifest-path crates/mcd-render/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: cargo publish --manifest-path crates/mcd-wasm/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: sleep 60
      - run: cargo publish --manifest-path crates/mcd-cli/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  python-wheels:
    name: Python wheel (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            artifact: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"
            artifact: linux-arm64
          - os: macos-latest
            target: universal2-apple-darwin
            manylinux: auto
            artifact: macos-universal2
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: auto
            artifact: windows-x64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.13.3
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --compatibility pypi
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.artifact }}
          path: bindings/python/dist/*.whl
          if-no-files-found: error

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    needs: python-wheels
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip maturin==1.13.3
      - run: maturin sdist --out dist
        working-directory: bindings/python
      - uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          path: bindings/python/dist
          merge-multiple: true
      - name: List Python distributions
        run: ls -lh bindings/python/dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/python/dist

  publish-typescript:
    name: Publish TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"
      - run: rustup target add wasm32-unknown-unknown
      - run: npm ci
        working-directory: bindings/typescript
      - run: npm test
        working-directory: bindings/typescript
      - run: npm run build
        working-directory: bindings/typescript
      - run: npm publish --access public
        working-directory: bindings/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-binaries:
    name: CLI binary (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            target: x86_64-unknown-linux-gnu
            archive: mcd-cli-linux-x64.tar.gz
            cross: false
          - os: ubuntu-latest
            artifact: linux-arm64
            target: aarch64-unknown-linux-gnu
            archive: mcd-cli-linux-arm64.tar.gz
            cross: true
          - os: macos-13
            artifact: macos-x64
            target: x86_64-apple-darwin
            archive: mcd-cli-macos-x64.tar.gz
            cross: false
          - os: macos-latest
            artifact: macos-arm64
            target: aarch64-apple-darwin
            archive: mcd-cli-macos-arm64.tar.gz
            cross: false
          - os: windows-latest
            artifact: windows-x64
            target: x86_64-pc-windows-msvc
            archive: mcd-cli-windows-x64.zip
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set up QEMU
        if: matrix.cross
        uses: docker/setup-qemu-action@v3
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build CLI
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p mcd-cli --target "${{ matrix.target }}"
          else
            cargo build --release -p mcd-cli --target "${{ matrix.target }}"
          fi
      - name: Archive Unix binary
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release mcd
      - name: Archive Windows binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/mcd.exe -DestinationPath ${{ matrix.archive }}
      - name: Write checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -Path "${{ matrix.archive }}").Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Set-Content -NoNewline -Encoding ascii "${{ matrix.archive }}.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
