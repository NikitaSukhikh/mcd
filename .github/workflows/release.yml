name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-rust:
    name: Publish Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --manifest-path crates/mcd-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: sleep 60
      - run: cargo publish --manifest-path crates/mcd-render/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: cargo publish --manifest-path crates/mcd-wasm/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
      - run: sleep 60
      - run: cargo publish --manifest-path crates/mcd-cli/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip maturin
      - run: maturin build --sdist --out dist
        working-directory: bindings/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: bindings/python/dist

  publish-typescript:
    name: Publish TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json
          registry-url: "https://registry.npmjs.org"
      - run: rustup target add wasm32-unknown-unknown
      - run: npm ci
        working-directory: bindings/typescript
      - run: npm test
        working-directory: bindings/typescript
      - run: npm run build
        working-directory: bindings/typescript
      - run: npm publish --access public
        working-directory: bindings/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-binaries:
    name: CLI binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            archive: mcd-cli-linux-x64.tar.gz
          - os: macos-latest
            artifact: macos-arm64
            archive: mcd-cli-macos-arm64.tar.gz
          - os: windows-latest
            artifact: windows-x64
            archive: mcd-cli-windows-x64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p mcd-cli
      - name: Archive Unix binary
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.archive }} -C target/release mcd
      - name: Archive Windows binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target/release/mcd.exe -DestinationPath ${{ matrix.archive }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
