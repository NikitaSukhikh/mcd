[package]
name = "mcd-cli"
version = "0.1.0-alpha.0"
edition.workspace = true
license.workspace = true
description = "Command line interface for Markdown CSV Document packages."

[[bin]]
name = "mcd"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
mcd-core = { path = "../mcd-core" }
serde_json = "1"

[lints]
workspace = true
